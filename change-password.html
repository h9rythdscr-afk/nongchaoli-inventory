<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>修改登录密码｜弄潮里库存系统</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    .password-page {
      width: min(92%, 460px);
      margin: 60px auto;
    }

    .password-card {
      padding: 28px 22px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    .password-card h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .password-card .description {
      margin: 0 0 24px;
      color: #777;
      line-height: 1.7;
    }

    .password-form {
      display: grid;
      gap: 14px;
    }

    .password-form label {
      display: grid;
      gap: 7px;
      font-size: 14px;
      color: #444;
    }

    .password-form input {
      width: 100%;
      padding: 14px;
      border: 1px solid #dedede;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .password-form button {
      margin-top: 8px;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #304e3d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .password-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .password-message {
      min-height: 24px;
      margin-top: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .password-message.error {
      color: #b42318;
    }

    .password-message.success {
      color: #247a45;
    }

    .back-link {
      display: block;
      margin-top: 18px;
      color: #52685a;
      text-align: center;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main class="password-page">
    <section class="password-card">
      <h1>修改登录密码</h1>

      <p class="description">
        修改成功后，系统会退出当前账号，请使用新密码重新登录。
      </p >

      <form id="passwordForm" class="password-form">
        <label>
          当前密码
          <input
            id="currentPassword"
            type="password"
            autocomplete="current-password"
            placeholder="请输入当前密码"
            required
          />
        </label>

        <label>
          新密码
          <input
            id="newPassword"
            type="password"
            autocomplete="new-password"
            placeholder="至少8位，建议包含字母和数字"
            required
          />
        </label>

        <label>
          确认新密码
          <input
            id="confirmPassword"
            type="password"
            autocomplete="new-password"
            placeholder="再次输入新密码"
            required
          />
        </label>

        <button id="submitBtn" type="submit">
          确认修改
        </button>
      </form>

      <div id="message" class="password-message"></div>

      <a class="back-link" href=" ">
        返回库存总览
      </a >
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="change-password.js"></script>
</body>
</html>
